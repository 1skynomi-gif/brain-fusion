name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --legacy-peer-deps
      - run: npm run build || exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
